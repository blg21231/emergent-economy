name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests + coverage
        run: npm run test:coverage
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: E2E (builds + previews prod bundle, runs CPU-fallback path)
        run: npx playwright test

  prod-smoke:
    # Post-deploy smoke against the live Vercel production URL (Vercel deploys via git integration).
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_URL: ${{ vars.PROD_URL || 'https://emergent-economy.vercel.app' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Wait for production to be live + serving this commit
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$SMOKE_URL" || true)
            echo "attempt $i: $SMOKE_URL -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "production URL did not return 200 in time" && exit 1
      - name: Prod smoke (journey + causality + panel-tags against live URL)
        run: npx playwright test tests/e2e/journey.spec.ts tests/e2e/causality.spec.ts tests/e2e/panels.spec.ts
